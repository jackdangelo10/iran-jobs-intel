# Cloud Build configuration for automated deployment
# Single Docker image, three Cloud Run Jobs
# 
# Service Accounts:
# - Build/Deploy: iran-jobs-deploy-sa (set in trigger configuration)
# - Runtime: iran-jobs-runtime-sa (specified in --service-account below)

steps:
  # ============================================================================
  # BUILD & PUSH IMAGE
  # ============================================================================
  
  # Step 1: Build the unified Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/iran-jobs-intel:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/iran-jobs-intel:latest'
      - '.'
    id: 'build-image'
    timeout: 600s

  # Step 2: Push image with commit SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/iran-jobs-intel:$SHORT_SHA'
    id: 'push-sha-image'

  # Step 3: Push image with latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/iran-jobs-intel:latest'
    id: 'push-latest-image'

  # ============================================================================
  # DEPLOY JOBS (all use iran-jobs-runtime-sa for execution)
  # ============================================================================

  # Step 4: Deploy Scraper Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'iran-jobs-scraper'
      - '--image'
      - 'gcr.io/$PROJECT_ID/iran-jobs-intel:$SHORT_SHA'
      - '--service-account'
      - 'iran-jobs-runtime-sa@$PROJECT_ID.iam.gserviceaccount.com'  # ← CHANGED
      - '--region'
      - 'us-central1'
      - '--max-retries'
      - '1'
      - '--task-timeout'
      - '7200'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--parallelism'
      - '1'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--args'
      - 'scraper'
    id: 'deploy-scraper-job'

  # Step 5: Deploy Processor Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'iran-jobs-processor'
      - '--image'
      - 'gcr.io/$PROJECT_ID/iran-jobs-intel:$SHORT_SHA'
      - '--service-account'
      - 'iran-jobs-runtime-sa@$PROJECT_ID.iam.gserviceaccount.com'  # ← CHANGED
      - '--region'
      - 'us-central1'
      - '--max-retries'
      - '2'
      - '--task-timeout'
      - '3600'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--parallelism'
      - '1'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--args'
      - 'processor'
    id: 'deploy-processor-job'

  # Step 6: Deploy Analytics Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'iran-jobs-analytics'
      - '--image'
      - 'gcr.io/$PROJECT_ID/iran-jobs-intel:$SHORT_SHA'
      - '--service-account'
      - 'iran-jobs-runtime-sa@$PROJECT_ID.iam.gserviceaccount.com'  # ← CHANGED
      - '--region'
      - 'us-central1'
      - '--max-retries'
      - '1'
      - '--task-timeout'
      - '1800'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--parallelism'
      - '1'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--args'
      - 'analytics'
    id: 'deploy-analytics-job'

# ============================================================================
# BUILD CONFIGURATION
# ============================================================================

timeout: 1200s

options:
  machineType: N1_STANDARD_1
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: 'us-central1'