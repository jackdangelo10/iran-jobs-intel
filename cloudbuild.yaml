# Cloud Build configuration for automated deployment
# Single Docker image, three Cloud Run Jobs
# 
# Service Accounts:
# - Build/Deploy: iran-jobs-deploy-sa (set in trigger configuration)
# - Runtime: iran-jobs-runtime-sa (specified in --service-account below)

steps:
  # ============================================================================
  # BUILD & PUSH IMAGE
  # ============================================================================
  
  # Step 1: Build the unified Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/iran-jobs-intel/iran-jobs-scraper:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/iran-jobs-intel/iran-jobs-scraper:latest'
      - '.'
    id: 'build-image'
    timeout: 600s

  # Step 2: Push both tags at once
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/iran-jobs-intel/iran-jobs-scraper'
    id: 'push-image'

  # ============================================================================
  # DEPLOY JOBS (all use iran-jobs-runtime-sa for execution)
  # ============================================================================

  # Step 3: Deploy Scraper Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'iran-jobs-scraper'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/iran-jobs-intel/iran-jobs-scraper:$SHORT_SHA'
      - '--service-account'
      - 'iran-jobs-runtime-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--region'
      - 'us-central1'
      - '--max-retries'
      - '1'
      - '--task-timeout'
      - '18000'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--parallelism'
      - '1'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--args'
      - 'scraper'
    id: 'deploy-scraper-job'

  # Step 4: Deploy Processor Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'iran-jobs-processor'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/iran-jobs-intel/iran-jobs-scraper:$SHORT_SHA'
      - '--service-account'
      - 'iran-jobs-runtime-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--region'
      - 'us-central1'
      - '--max-retries'
      - '2'
      - '--task-timeout'
      - '3600'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--parallelism'
      - '1'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--args'
      - 'processor'
    id: 'deploy-processor-job'

  # Step 5: Deploy Analytics Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'iran-jobs-analytics'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/iran-jobs-intel/iran-jobs-scraper:$SHORT_SHA'
      - '--service-account'
      - 'iran-jobs-runtime-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--region'
      - 'us-central1'
      - '--max-retries'
      - '1'
      - '--task-timeout'
      - '1800'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--parallelism'
      - '1'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--args'
      - 'analytics'
    id: 'deploy-analytics-job'

# ============================================================================
# BUILD CONFIGURATION
# ============================================================================

timeout: 1200s

options:
  machineType: N1_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-central1
